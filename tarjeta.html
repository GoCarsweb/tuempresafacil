<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta de contacto</title>
<meta name="theme-color" content="#0A2540">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A2540;
    --blue:#1857C9;
    --celeste:#4FC3F7;
    --purple:#8B5CF6;
    --purple-deep:#6D28D9;
    --white:#FFFFFF;
    --gray-900:#1E2530;
    --gray-600:#5B6472;
    --gray-300:#B9C3D0;
    --bg-soft:#F4F8FC;
    --bg-soft-2:#EEF3FA;
    --green:#10B981;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --radius:18px;
    --shadow:0 20px 45px -20px rgba(10,37,64,0.25);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--font-body); background:linear-gradient(160deg,var(--navy),#123a68 55%,var(--blue)); min-height:100vh; color:var(--gray-900); -webkit-font-smoothing:antialiased; display:flex; align-items:flex-start; justify-content:center; padding:24px 16px 40px;}
  h1,h2,h3{font-family:var(--font-display); color:var(--navy);}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}

  .card{background:white; border-radius:var(--radius); box-shadow:var(--shadow); max-width:420px; width:100%; overflow:hidden;}
  .card-top{background:linear-gradient(135deg,var(--navy),var(--blue)); padding:36px 28px 60px; text-align:center; position:relative;}
  .avatar{width:104px; height:104px; border-radius:50%; object-fit:cover; border:4px solid white; margin:0 auto; box-shadow:0 8px 20px -6px rgba(0,0,0,0.35); background:var(--bg-soft); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:34px; font-weight:700; color:var(--navy);}
  .card-body{padding:56px 28px 30px; margin-top:-46px; text-align:center;}
  .nombre{font-size:24px; margin-bottom:4px;}
  .cargo{color:var(--purple-deep); font-weight:600; font-size:14.5px; margin-bottom:2px;}
  .empresa{color:var(--gray-600); font-size:14px; margin-bottom:14px;}
  .bio{color:var(--gray-600); font-size:13.5px; line-height:1.5; max-width:320px; margin:0 auto 22px;}

  .save-btn{display:flex; align-items:center; justify-content:center; gap:9px; width:100%; background:linear-gradient(120deg,var(--blue),var(--celeste)); color:white; border:none; border-radius:12px; padding:14px; font-weight:700; font-size:15px; box-shadow:0 12px 26px -10px rgba(24,87,201,0.55); margin-bottom:20px;}
  .save-btn svg{width:19px; height:19px; stroke:white; fill:none; stroke-width:2;}

  .actions{display:grid; grid-template-columns:repeat(auto-fit,minmax(84px,1fr)); gap:10px; margin-bottom:22px;}
  .action{display:flex; flex-direction:column; align-items:center; gap:7px; padding:14px 8px; background:var(--bg-soft); border-radius:12px; font-size:11.5px; font-weight:600; color:var(--navy); transition:transform .15s, background .15s;}
  .action:hover{background:var(--bg-soft-2); transform:translateY(-2px);}
  .action .icon-circle{width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .action .icon-circle svg{width:19px; height:19px; stroke:white; fill:none; stroke-width:2;}
  .action.wa .icon-circle{background:#25D366;}
  .action.mail .icon-circle{background:var(--blue);}
  .action.map .icon-circle{background:var(--red,#EF4444);}
  .action.web .icon-circle{background:var(--purple);}

  .divider{height:1px; background:var(--bg-soft-2); margin:4px 0 20px;}

  .info-line{display:flex; align-items:center; gap:10px; font-size:13.5px; color:var(--gray-900); padding:9px 0; text-align:left;}
  .info-line svg{width:16px; height:16px; stroke:var(--gray-600); fill:none; stroke-width:2; flex-shrink:0;}

  .socials{display:flex; gap:10px; justify-content:center; margin-top:18px;}
  .social-btn{width:42px; height:42px; border-radius:50%; background:var(--bg-soft); display:flex; align-items:center; justify-content:center; transition:background .15s, transform .15s;}
  .social-btn:hover{transform:translateY(-2px);}
  .social-btn svg{width:19px; height:19px; stroke:var(--navy); fill:none; stroke-width:1.8;}
  .social-btn.ig:hover{background:#F9CE9022;}
  .social-btn.li:hover{background:#0A66C222;}

  .footer-brand{text-align:center; padding:16px; font-size:11px; color:var(--gray-300); background:var(--bg-soft);}
  .footer-brand a{color:var(--blue); font-weight:600;}

  .state{background:white; border-radius:var(--radius); box-shadow:var(--shadow); max-width:380px; width:100%; padding:50px 30px; text-align:center;}
  .state svg{width:44px; height:44px; stroke:var(--gray-300); fill:none; stroke-width:1.5; margin:0 auto 18px;}
  .state h2{font-size:18px; margin-bottom:8px;}
  .state p{color:var(--gray-600); font-size:14px;}

  /* BARRA SUPERIOR TU EMPRESA FÁCIL */
  .page{display:flex; flex-direction:column; align-items:center; gap:18px; width:100%; max-width:420px;}
  .brand-bar{display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.18); backdrop-filter:blur(6px); border-radius:12px; padding:8px 10px 8px 14px;}
  .brand-bar img{height:22px; width:auto; display:block; filter:brightness(0) invert(1);}
  .brand-bar .bb-links{display:flex; align-items:center; gap:6px;}
  .brand-bar .bb-links a{width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; transition:background .15s;}
  .brand-bar .bb-links a:hover{background:rgba(255,255,255,0.22);}
  .brand-bar .bb-links a svg{width:16px; height:16px; stroke:white; fill:none; stroke-width:2;}
</style>
</head>
<body>

<div class="page">
  <div class="brand-bar">
    <a href="/" title="Tu Empresa Fácil"><img src="logo.png" alt="Tu Empresa Fácil"></a>
    <div class="bb-links">
      <a href="https://wa.me/56995932848" target="_blank" title="WhatsApp Tu Empresa Fácil">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.5 8.5 0 0 1-12.4 7.5L3 20l1.1-5.4A8.5 8.5 0 1 1 21 11.5z"/></svg>
      </a>
      <a href="https://www.instagram.com/tu_empresa_facil" target="_blank" title="Instagram Tu Empresa Fácil">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/></svg>
      </a>
      <a href="/" title="Sitio web Tu Empresa Fácil">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 010 20 15 15 0 010-20z"/></svg>
      </a>
    </div>
  </div>

  <div id="root">
    <div class="state">
      <div class="loader" style="width:32px;height:32px;border:3px solid var(--bg-soft-2);border-top-color:var(--blue);border-radius:50%;margin:0 auto;animation:spin .7s linear infinite;"></div>
    </div>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg);}}</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC7g58lq3sC2_hir8biFz-XbnYauUbotQ8",
    authDomain: "tuempresafacil.firebaseapp.com",
    databaseURL: "https://tuempresafacil-default-rtdb.firebaseio.com",
    projectId: "tuempresafacil",
    storageBucket: "tuempresafacil.firebasestorage.app",
    messagingSenderId: "593477480462",
    appId: "1:593477480462:web:01e7b9eb4c20ce22e80c5f",
    measurementId: "G-J4FJ9Q6SR6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const root = document.getElementById("root");

  const slug = decodeURIComponent(window.location.pathname.replace(/^\/+|\/+$/g, "")).toLowerCase();

  function renderNotFound(){
    root.innerHTML = `
      <div class="state">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        <h2>Tarjeta no encontrada</h2>
        <p>Este enlace no corresponde a ninguna tarjeta activa. Verifica la URL o contacta a quien te la compartió.</p>
      </div>
    `;
  }

  function escapeHtml(s){
    return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function initials(name){
    return (name || "?").trim().split(/\s+/).slice(0,2).map(w => w[0]).join("").toUpperCase();
  }

  function buildVCard(d){
    const lines = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      `N:;${d.nombre || ""};;;`,
      `FN:${d.nombre || ""}`,
      d.empresa ? `ORG:${d.empresa}` : "",
      d.cargo ? `TITLE:${d.cargo}` : "",
      d.telefono ? `TEL;TYPE=CELL:${d.telefono}` : "",
      d.correo ? `EMAIL:${d.correo}` : "",
      d.web ? `URL:${d.web}` : "",
      d.direccion ? `ADR;TYPE=WORK:;;${d.direccion};;;;` : "",
      "END:VCARD"
    ].filter(Boolean);
    return lines.join("\r\n");
  }

  function normPhone(p){ return (p || "").replace(/[^\d]/g, ""); }

  function renderCard(d){
    document.title = `${d.nombre || "Contacto"} · Tarjeta digital`;

    const avatar = d.foto
      ? `<img class="avatar" src="${d.foto}" alt="${escapeHtml(d.nombre)}">`
      : `<div class="avatar">${initials(d.nombre)}</div>`;

    const actions = [];
    if(d.telefono) actions.push(`
      <a class="action wa" target="_blank" href="https://wa.me/${normPhone(d.telefono)}">
        <span class="icon-circle"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.5 8.5 0 0 1-12.4 7.5L3 20l1.1-5.4A8.5 8.5 0 1 1 21 11.5z"/></svg></span>
        WhatsApp
      </a>`);
    if(d.correo) actions.push(`
      <a class="action mail" href="mailto:${d.correo}">
        <span class="icon-circle"><svg viewBox="0 0 24 24"><path d="M3 6l9 7 9-7M3 6h18v12H3z"/></svg></span>
        Correo
      </a>`);
    if(d.mapsLink || d.direccion) actions.push(`
      <a class="action map" target="_blank" href="${d.mapsLink || `https://maps.google.com/?q=${encodeURIComponent(d.direccion)}`}">
        <span class="icon-circle"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
        Ubicación
      </a>`);
    if(d.web) actions.push(`
      <a class="action web" target="_blank" href="${d.web}">
        <span class="icon-circle"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 010 20 15 15 0 010-20z"/></svg></span>
        Sitio web
      </a>`);

    const infoLines = [];
    if(d.telefono) infoLines.push(`<div class="info-line"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.12.9.34 1.79.65 2.65a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.43-1.42a2 2 0 012.11-.45c.86.31 1.75.53 2.65.65A2 2 0 0122 16.92z"/></svg> ${escapeHtml(d.telefono)}</div>`);
    if(d.correo) infoLines.push(`<div class="info-line"><svg viewBox="0 0 24 24"><path d="M3 6l9 7 9-7M3 6h18v12H3z"/></svg> ${escapeHtml(d.correo)}</div>`);
    if(d.direccion) infoLines.push(`<div class="info-line"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> ${escapeHtml(d.direccion)}</div>`);

    const socials = [];
    if(d.instagram) socials.push(`<a class="social-btn ig" target="_blank" href="${d.instagram.startsWith("http") ? d.instagram : "https://instagram.com/" + d.instagram.replace("@","")}"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></a>`);
    if(d.linkedin) socials.push(`<a class="social-btn li" target="_blank" href="${d.linkedin.startsWith("http") ? d.linkedin : "https://linkedin.com/in/" + d.linkedin}"><svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg></a>`);

    root.innerHTML = `
      <div class="card">
        <div class="card-top">${avatar}</div>
        <div class="card-body">
          <div class="nombre">${escapeHtml(d.nombre) || "Sin nombre"}</div>
          ${d.cargo ? `<div class="cargo">${escapeHtml(d.cargo)}</div>` : ""}
          ${d.empresa ? `<div class="empresa">${escapeHtml(d.empresa)}</div>` : ""}
          ${d.bio ? `<div class="bio">${escapeHtml(d.bio)}</div>` : ""}

          <button class="save-btn" id="saveContactBtn">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
            Guardar contacto
          </button>

          ${actions.length ? `<div class="actions">${actions.join("")}</div>` : ""}

          <div class="divider"></div>
          ${infoLines.join("")}

          ${socials.length ? `<div class="socials">${socials.join("")}</div>` : ""}
        </div>
        <div class="footer-brand">Tarjeta digital creada con <a href="/">Tu Empresa Fácil</a></div>
      </div>
    `;

    document.getElementById("saveContactBtn").addEventListener("click", () => {
      const vcard = buildVCard(d);
      const blob = new Blob([vcard], { type: "text/vcard" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${(d.nombre || "contacto").replace(/\s+/g, "_")}.vcf`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    });
  }

  async function init(){
    if(!slug){ renderNotFound(); return; }
    try {
      const snap = await get(ref(db, `tarjetas/${slug}`));
      if(!snap.exists() || snap.val().activo === false){ renderNotFound(); return; }
      renderCard(snap.val());
    } catch(e){
      console.error(e);
      renderNotFound();
    }
  }

  init();
</script>
</body>
</html>
